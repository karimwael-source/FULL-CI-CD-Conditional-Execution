name: Conditional Training Pipeline

on:
  push:

jobs:
  linter:
    name: Linter Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: flake8 train.py
        
  train:
    name: GPU Training
    runs-on: ubuntu-latest
    needs: linter
    if: ${{ needs.linter.result == 'success' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        run: |
          set -o pipefail
          if [[ "${{ github.event.head_commit.message }}" == *"[fail-train]"* ]]; then
            python train.py --fail 2>&1 | tee error_logs.txt
          else
            python train.py 2>&1 | tee error_logs.txt
          fi

      - name: Upload error logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: training-error-logs
          path: error_logs.txt

      - name: Cleanup temporary resources
        if: ${{ always() }}
        run: echo "Cleaning up temporary cloud volumes..."